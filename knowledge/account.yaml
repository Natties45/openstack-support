      ranking:
        name: "ระดับสมาชิก (Membership & Ranking)"
        entries:
          - id: acc-check-ranking
            keywords: [ระดับสมาชิก, ranking, rank, membership, tier, level, ตรวจสอบ rank, ดูระดับ, member level]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถตรวจสอบระดับสมาชิกได้ที่หน้า Account
              และดูรายละเอียดเงื่อนไขเพิ่มเติมได้ตามลิงก์แนบครับ:
              https://blog.openlandscape.cloud/ols-privilege
              ขอบคุณครับ
            refs:
              - title: "สิทธิประโยชน์ระบบสมาชิก"
                url: "https://blog.openlandscape.cloud/ols-privilege"
          - id: acc-upgrade-rank
            keywords: [upgrade rank, เพิ่ม rank, เลื่อนระดับ, เพิ่มระดับสมาชิก, อัพเกรด, upgrade, สะสมยอด, rank up]
            intent: request
