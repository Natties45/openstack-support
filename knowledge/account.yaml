            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถดูเงื่อนไขการให้บริการตามระดับสมาชิกได้ตามลิงก์แนบครับ:
              https://blog.openlandscape.cloud/customer-support
              ขอบคุณครับ
            refs:
              - title: "ช่วงเวลาให้บริการตามระดับสมาชิก"
                url: "https://blog.openlandscape.cloud/customer-support"

      quota-instance:
        name: "Quota & Instance"
        entries:
          - id: acc-quota-increase
            keywords: [ขอเพิ่ม quota, instance quota, โควต้า, quota, เพิ่ม instance, request quota, เพิ่มเครื่อง, เพิ่มโควต้า, quota instance]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              การขอเพิ่มโควตา Instance สามารถกรอกแบบฟอร์มตามลิงก์นี้ได้ครับ:
              https://form.typeform.com/to/ge5RrIh8
              หลังกรอกข้อมูลเรียบร้อย รบกวนแจ้งกลับผ่าน Ticket ที่ท่านติดต่อเข้ามา
              เพื่อให้ทีมที่เกี่ยวข้องพิจารณาภายใน 2 วันทำการครับ
              ขอบคุณครับ
            refs:
              - title: "แบบฟอร์มขอเพิ่ม Quota Instance"
                url: "https://form.typeform.com/to/ge5RrIh8"
          - id: acc-quota-rank-drop
            keywords: [quota ลดลง, rank ลดแล้วสร้างใหม่, โควต้าหลัง rank ลด, instance เดิมเกิน quota, ลบเครื่อง, create new instance, quota limit]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              จำนวน Instance ที่เกินจากจำนวนที่กำหนดในระดับสมาชิกปัจจุบันยังสามารถใช้งานได้ตามปกติครับ
              อย่างไรก็ตาม หากผู้ใช้บริการลบ Instance ที่ใช้งานอยู่แล้ว
              อาจไม่สามารถสร้าง Instance ใหม่เพิ่มได้ตามจำนวนเดิมครับ (ขึ้นกับโควตาปัจจุบัน)
              ทั้งนี้ผู้ใช้บริการสามารถดูเงื่อนไขระดับสมาชิกได้ตามลิงก์แนบ:
              https://blog.openlandscape.cloud/ols-privilege
              ขอบคุณครับ
            refs:
              - title: "สิทธิประโยชน์ระบบสมาชิก"
                url: "https://blog.openlandscape.cloud/ols-privilege"

      ekyc:
