              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถดูคู่มือการใช้งานได้ที่หน้า gate.openlandscape.cloud
              เมนู Support > Documentation > OLS Product Documentation
              และสามารถดูบทความการใช้งานเพิ่มเติมได้ที่ https://blog.openlandscape.cloud
              ขอบคุณครับ
            refs:
              - title: "OLS Knowledge Hub"
                url: "https://blog.openlandscape.cloud"
          - id: acc-new-gate-guide
            keywords: [new gate, gate รูปแบบใหม่, หน้า gate ใหม่, new ui, interface ใหม่, ใช้งาน gate ใหม่, gate ใหม่]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ทางทีมขออนุญาตแนบคู่มือการใช้งานหน้า gate รูปแบบใหม่ครับ
              รายละเอียดตามลิงก์แนบ:
              https://blog.openlandscape.cloud/how-to-use-the-new-gate
              ขอบคุณครับ
            refs:
              - title: "วิธีใช้งานหน้า Gate รูปแบบใหม่"
                url: "https://blog.openlandscape.cloud/how-to-use-the-new-gate"
          - id: acc-report-problem
            keywords: [แจ้งปัญหา, เปิด ticket, report problem, ติดต่อ, สร้าง ticket, open ticket, support ticket, ติดต่อ support]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถแจ้งปัญหาผ่าน Ticket Support ได้ตามขั้นตอนในลิงก์แนบครับ:
              https://blog.openlandscape.cloud/report-a-problem/
              ขอบคุณครับ
            refs:
              - title: "การแจ้งปัญหา/เปิด Ticket"
