            refs: []
      resolution:
        name: "Resolution"
        entries:
          - id: generic-resolved
            keywords:
              - แก้ไขเรียบร้อย
              - เสร็จแล้ว
              - resolved
              - ดำเนินการให้
            intent: info
            answer: |
              เรียน ผู้ใช้บริการ

              ทาง Openlandscape ดำเนินการแก้ไขเรียบร้อยแล้วครับ รบกวนตรวจสอบการใช้งานอีกครั้ง

              ทั้งนี้ หากพบปัญหาการใช้งานเพิ่มเติม สามารถติดต่อ OpenLandscape ได้ในวันจันทร์-ศุกร์ เวลา 09:00 - 18.00 น. ครับ

              ขอบคุณครับ
            refs: []
          - id: generic-customer-confirmed-working
            keywords:
              - ใช้งานได้เรียบร้อย
              - แจ้งมาใช้งานได้
              - working
              - ใช้งานได้แล้ว
            intent: info
            answer: |
              เรียน ผู้ใช้บริการ

              Openlandscape ยินดีให้บริการครับ หากพบปัญหาการใช้งานเพิ่มเติม สามารถแจ้งปัญหาผ่านระบบ Ticket Support ได้ตลอดเวลาครับ

              ขอบคุณครับ
            refs: []
          - id: generic-after-call-working
            keywords:
              - โทรคุย
              - เรียนสาย
              - โทรแจ้ง
              - after call
              - ใช้งานได้แล้วหลังโทร
            intent: info
            answer: |
              เรียน ผู้ใช้บริการ

              จากที่ได้เรียนสายเมื่อสักครู่ ปัจจุบันผู้ใช้บริการสามารถใช้งานได้เรียบร้อยแล้ว

              ทั้งนี้ หากพบปัญหาการใช้งานเพิ่มเติม สามารถแจ้งผ่านระบบ Ticket Support ได้ตลอดเวลาครับ

              ขอบคุณครับ
            refs: []
          - id: generic-after-call-informed
            keywords:
              - เรียนสายแจ้ง
              - โทรแจ้งรายละเอียด
              - ติดต่อแจ้งลูกค้า
            intent: info
            answer: |
              จากการเรียนสาย ปัจจุบันทางเจ้าหน้าที่ได้ติดต่อและแจ้งรายละเอียดกับลูกค้าเรียบร้อยแล้ว

              หากพบปัญหาการใช้งานเพิ่มเติม สามารถติดต่อทาง OpenLandscape ได้ตลอดเวลาทำการครับ

              ขอบคุณครับ
            refs: []
      no-response:
        name: "No Response from Customer"
        entries:
          - id: generic-customer-no-response
            keywords:
              - ไม่ตอบกลับ
              - ไม่ตอบ ticket
              - no response
              - เงียบ
            intent: info
            answer: |
              เรียน ผู้ใช้บริการ

              จากปัญหาที่ท่านได้แจ้งเข้ามาก่อนหน้านี้ ไม่ทราบว่ายังคงพบปัญหาดังกล่าวอยู่หรือไม่ครับ

              หากยังคงพบปัญหาการใช้งาน สามารถติดต่อผ่านระบบ Ticket Support ได้ตลอดเวลาครับ

              ทั้งนี้ ขอบคุณครับ
            refs: []
      contact:
        name: "Contact & Callback"
        entries:
          - id: generic-request-phone
            keywords:
              - ขอ contact
              - ขอเบอร์
              - ติดต่อไม่ได้
              - โทรศัพท์
              - contact เพิ่มเติม
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ

              เพื่อความรวดเร็วในการแก้ไขปัญหา ทาง OpenLandscape รบกวนขอเบอร์โทรศัพท์ที่สามารถติดต่อได้เพิ่มเติม เนื่องจากเบอร์โทรศัพท์ตามข้อมูลที่ลงทะเบียนไว้ไม่สามารถติดต่อได้ครับ

              ขอบคุณครับ
            refs: []
          - id: generic-officer-callback
            keywords:
              - เจ้าหน้าที่ติดต่อกลับ
              - โทรกลับ
              - callback
              - ติดต่อกลับ
            intent: info
            answer: |
              เรียน ผู้ใช้บริการ

              จากปัญหาที่ท่านได้แจ้งเข้ามา เจ้าหน้าที่จะติดต่อกลับเพื่อให้ข้อมูลที่เกี่ยวข้องเพิ่มเติม

              ทั้งนี้ หากพบปัญหาการใช้งานเพิ่มเติม สามารถติดต่อทาง Openlandscape ได้ตลอดเวลาทำการครับ

              ขอบคุณครับ
