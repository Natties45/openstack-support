              รายละเอียดตามลิงก์แนบ:
              https://openlandscape.cloud/policy/term_and_condition
              ขออภัยในความไม่สะดวกครับ
              ขอบคุณครับ
            refs:
              - title: "ข้อตกลงและเงื่อนไขการให้บริการ"
                url: "https://openlandscape.cloud/policy/term_and_condition"

