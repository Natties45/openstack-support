      packages:
        name: "Package & Product"
        entries:
          - id: acc-package-not-available
            keywords: [package not available, starter package, S.A, S.B, not available, ไม่สามารถสร้าง instance, package หาย, ไม่มี package, unable to create]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              จากการตรวจสอบพบว่า Package S.A และ S.B ในกลุ่ม Starter แสดงสถานะ Not Available
              เนื่องจากปัจจุบันทาง OpenLandscape ไม่ได้เปิดให้บริการ Package ดังกล่าว
              จึงทำให้ผู้ใช้บริการไม่สามารถสร้าง Instance ด้วย Package S.A และ S.B ได้ในขณะนี้ครับ
              ทั้งนี้ Package อื่นในกลุ่ม Starter เช่น S.C ยังสามารถใช้งานได้ตามปกติครับ
              ขออภัยในความไม่สะดวกครับ
            refs: []
