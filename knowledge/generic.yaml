            intent: info
            answer: |
              เรียน ผู้ใช้บริการ

              ทาง OpenLandscape รับทราบข้อมูลและกำลังดำเนินการตรวจสอบเพิ่มเติม หากมีความคืบหน้าจะแจ้งให้ทราบโดยทันทีครับ

              ขออภัยในความไม่สะดวกที่เกิดขึ้น

