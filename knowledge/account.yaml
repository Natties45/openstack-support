categories:
  account:
    name: "Gate & Account"
    sections:
      registration:
        name: "การสมัครสมาชิก (Registration)"
        entries:
          - id: acc-signup-how
            keywords: [สมัครสมาชิก, sign up, register, registration, gate, สมัคร, ลงทะเบียน, สร้างบัญชี, create account]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถดูวิธีการสมัครสมาชิกและการเข้าใช้งานระบบได้ตามลิงก์แนบครับ:
              https://blog.openlandscape.cloud/sign-up-and-access-the-ekyc-system
              ขอบคุณครับ
            refs:
              - title: "วิธีการสมัครสมาชิกและการเข้าใช้งานระบบ eKYC"
                url: "https://blog.openlandscape.cloud/sign-up-and-access-the-ekyc-system"
          - id: acc-signup-no-email
            keywords: [ไม่ได้รับอีเมลยืนยัน, email verification, ไม่ได้รับอีเมล, ยืนยันอีเมล, ไม่มีอีเมล, junk, spam, signup email, confirm email]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              เบื้องต้นรบกวนตรวจสอบอีเมลในกล่อง Junk/Spam และค้นหาคำว่า Openlandscape หรือ OLS ครับ
              หากยังไม่พบ รบกวนแจ้งอีเมลที่ใช้สมัครผ่าน Ticket เพื่อให้ทางทีมตรวจสอบเพิ่มเติมครับ
              ขอบคุณครับ
            refs:
              - title: "การสมัครและเข้าใช้งานระบบ eKYC"
                url: "https://blog.openlandscape.cloud/sign-up-and-access-the-ekyc-system"
      login:
        name: "การเข้าสู่ระบบ (Login)"
        entries:
          - id: acc-login-failed
            keywords: [login ไม่ได้, เข้าไม่ได้, login failed, cannot login, ค้าง, วนลูป, error, เข้าสู่ระบบไม่ได้, หน้า gate, cannot access]
            intent: incident
            answer: |
              เรียน ผู้ใช้บริการ
              กรณีที่ไม่สามารถ Log in ได้ อาจเกิดจากข้อมูล Cache / Cookie ที่ค้างอยู่ใน Browser
              แนะนำให้ลองล้างแคชและคุกกี้ก่อน แล้วทดสอบเข้าใช้งานใหม่
              โดยกด Ctrl + Shift + Delete เลือกช่วงเวลาเป็น All time
              ติ๊กเลือก Cookies and other site data และ Cached images and files
              กด Clear data แล้วปิด/เปิด Browser ใหม่ จากนั้นลอง Log in อีกครั้ง
              หากยังไม่หาย แนะนำลองเข้าแบบ Incognito/Private หรือทดลองผ่าน Browser อื่นชั่วคราวครับ
            refs:
              - title: "วิธีใช้งานหน้า Gate รูปแบบใหม่"
                url: "https://blog.openlandscape.cloud/how-to-use-the-new-gate"
          - id: acc-login-cors
            keywords: [CORS, cross origin, login CORS, access control, CORS error, hard refresh, refresh, cross-origin]
            intent: incident
            answer: |
              เรียน ผู้ใช้บริการ
              กรณีที่ไม่สามารถ Log in ได้ เบื้องต้นคาดว่าอาจเกิดจาก CORS (Cross-Origin Resource Sharing)
              แนะนำให้ลองทำการ Hard Refresh ก่อน โดยกด Ctrl + Shift + R (Windows) หรือ Cmd + Shift + R (Mac)
              หลังจากนั้นให้ปิด/เปิด Browser ใหม่ และลอง Log in อีกครั้ง
              หากยังไม่สามารถเข้าใช้งานได้ แนะนำให้ลองล้าง Cache / Cookie และทดลองผ่าน Incognito / Private Mode หรือ Browser อื่นครับ
            refs: []
          - id: acc-forgot-password
            keywords: [ลืมรหัสผ่าน, forgot password, reset password, รีเซ็ตรหัสผ่าน, ตั้งรหัสผ่านใหม่, password, ลืม password, จำรหัสไม่ได้, Gate, เข้าระบบ, login, หน้าเว็บ, หน้า Gate]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              เบื้องต้นแนะนำให้ดำเนินการ Forgot Password ที่หน้าเข้าสู่ระบบ
              และตรวจสอบอีเมลสำหรับตั้งรหัสผ่านใหม่ครับ
              หากไม่ได้รับอีเมล รบกวนตรวจสอบ Junk/Spam
              และแจ้งอีเมลบัญชีผู้ใช้บริการผ่าน Ticket เพื่อให้ทางทีมตรวจสอบเพิ่มเติมครับ
              ขอบคุณครับ
            refs:
              - title: "การจัดการบัญชี (Manage Account)"
                url: "https://blog.openlandscape.cloud/manage-account/"

      account-management:
        name: "การจัดการบัญชี (Account Management)"
        entries:
          - id: acc-change-email
            keywords: [เปลี่ยนอีเมล, change email, email account, เปลี่ยน email, แก้ไขอีเมล, update email, อีเมลใหม่]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถจัดการ Account และเปลี่ยนข้อมูลบัญชีได้ตามคู่มือครับ
              รายละเอียดตามลิงก์แนบ:
              https://blog.openlandscape.cloud/manage-account/
              ขอบคุณครับ
            refs:
              - title: "การจัดการบัญชี (Manage Account)"
                url: "https://blog.openlandscape.cloud/manage-account/"
          - id: acc-edit-profile
            keywords: [แก้ไขโปรไฟล์, ข้อมูลผู้ใช้, profile, edit profile, แก้ไขข้อมูล, update profile, account info, ข้อมูลส่วนตัว]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถจัดการข้อมูลบัญชี (Account) ได้ตามคู่มือครับ
              รายละเอียดตามลิงก์แนบ:
              https://blog.openlandscape.cloud/manage-account/
              ขอบคุณครับ
            refs:
              - title: "การจัดการบัญชี (Manage Account)"
                url: "https://blog.openlandscape.cloud/manage-account/"

      notifications:
        name: "การแจ้งเตือน (Notifications)"
        entries:
          - id: acc-notifications-how
            keywords: [เปิดปิดแจ้งเตือน, notifications, noti, การแจ้งเตือน, ตั้งค่าแจ้งเตือน, ดูแจ้งเตือนย้อนหลัง, notification settings, toggle notification]
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ
              ผู้ใช้บริการสามารถตรวจสอบข้อมูลผ่านเมนู Notifications ภายในระบบได้ครับ
              รายละเอียดตามลิงก์แนบ:
              https://blog.openlandscape.cloud/notification-feature/
              ขอบคุณครับ
            refs:
              - title: "ฟีเจอร์ Notification"
                url: "https://blog.openlandscape.cloud/notification-feature/"
          - id: acc-notifications-missing
            keywords: [ไม่เห็น notifications, ไม่ขึ้นแจ้งเตือน, notification missing, noti ไม่ขึ้น, แจ้งเตือนหาย, ไม่มีการแจ้งเตือน, noti หาย]
            intent: incident
            answer: |
              เรียน ผู้ใช้บริการ
              เบื้องต้นแนะนำให้ Logout แล้ว Login ใหม่ และลองล้าง Cache/Cookies ของเบราว์เซอร์ครับ
              หากยังไม่แสดงผล รบกวนแนบภาพหน้าจอเมนู Notifications
              และแจ้งอีเมลบัญชีผู้ใช้บริการผ่าน Ticket เพื่อให้ทางทีมตรวจสอบเพิ่มเติมครับ
              ขอบคุณครับ
            refs:
              - title: "ฟีเจอร์ Notification"
                url: "https://blog.openlandscape.cloud/notification-feature/"

      guides:
        name: "คู่มือการใช้งาน (Guides & Documentation)"
        entries:
