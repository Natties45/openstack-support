              - VMware
              - VirtualBox
              - ย้ายลง local
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ ปัจจุบันระบบยังไม่รองรับการ Export Instance ออกไปใช้งานบน Local Host (เช่น VMware/VirtualBox) โดยตรงครับ หากต้องการทดสอบ แนะนำให้ทำ Snapshot ก่อนเพื่อความปลอดภัยครับ
            refs:
              - title: "Take Snapshot"
                url: "https://blog.openlandscape.cloud/take-snapshot/"
          - id: vm-limits-migrate-account
            keywords:
              - ย้าย account
              - ย้าย instance ข้ามบัญชี
              - เปลี่ยนเจ้าของ
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ ปัจจุบันระบบยังไม่รองรับการย้าย Instance ไปยังบัญชีผู้ใช้ใหม่โดยตรงครับ ขออภัยในความไม่สะดวก
            refs: []
          - id: vm-limits-daily-backup
            keywords:
              - daily backup
              - backup รายเครื่อง
              - backup อัตโนมัติ
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ บริการไม่มี Daily Backup รายเครื่องครับ แนะนำให้ผู้ใช้บริการทำ Snapshot เป็นระยะเพื่อสำรองข้อมูลแทนครับ
            refs:
              - title: "Take Snapshot"
                url: "https://blog.openlandscape.cloud/take-snapshot/"
          - id: vm-limits-dns-server-name
            keywords:
              - DNS server name
              - ขอ DNS
              - domain
            intent: request
            answer: |
              เรียน ผู้ใช้บริการ ในส่วนข้อมูล DNS server name ทางบริษัทขอสงวนสิทธิ์ในการให้บริการครับ ขออภัยในความไม่สะดวก
            refs: []
      vm-service:
        name: "VM/Service"
        entries:
          - id: vm-service-high-utilize
            keywords:
              - utilization สูง
              - CPU สูง
              - RAM สูง
              - ตรวจสอบ utilize
            intent: incident
            answer: |
              เรียน ผู้ใช้บริการจากการตรวจสอบย้อนหลังพบว่า Utilize Instance มีการใช้งาน (CPU or Ram) สูง โดยมีรายละเอียดตามรูปภาพที่ได้แนบมาทั้งนี้ ขอแนะนำให้ผู้ใช้บริการเช็ค Utilize Instance เบื้องต้นครับ
            refs:
              - title: "How to Check Utilize"
                url: "https://blog.openlandscape.cloud/how-to-check-utilize"
          - id: vm-service-internal-fix
            keywords:
              - แก้ service ภายใน
              - ช่วยดู service
              - service ในเครื่อง
              - ภายใน VM
            intent: incident
            answer: |
              เรียน ผู้ใช้บริการ คำขอให้ทางทีมเข้าไปตรวจสอบ Service ภายในเครื่อง เป็นการจัดการภายใน Instance ของผู้ใช้บริการ ซึ่งอยู่นอกขอบเขตการให้บริการ อย่างไรก็ตาม ทางทีมสามารถช่วยตรวจสอบได้ เฉพาะระดับ VM/Platform เช่น สถานะ Instance, Network/Public IP, Security Group/Port และสถานะ Storage/IO ฝั่งระบบ เพื่อให้ตรวจสอบได้ถูกต้อง รบกวนแจ้งข้อมูลดังนี้ Instance name, Public IP, ช่วงเวลาที่พบปัญหา, อาการ/ข้อความ Error
            refs: []
          - id: vm-service-clear-cache
            keywords:
              - clear cache
              - ล้างแคช
              - เว็บค้าง
              - ข้อมูลไม่อัปเดต
            intent: incident
            answer: |
              เรียน ผู้ใช้บริการ ทางทีมขอแนะนำวิธีเคลียร์แคช (Clear Cache) เพื่อแก้ปัญหาหน้าเว็บค้าง/ข้อมูลไม่อัปเดต หรือใช้งานแล้วแสดงผลผิดปกติ โดยสามารถทำตามขั้นตอนได้จากคู่มือด้านล่างนี้
            refs:
              - title: "เช็ค Cached & ปัญหา Linux ช้า"
                url: "https://blog.openlandscape.cloud/cached"
