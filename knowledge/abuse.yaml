              - suspension
              - object storage
              - bucket
              - ผิดเงื่อนไข
            intent: info
            answer: |
              เรียน ผู้ใช้บริการ
              กรณีการระงับการใช้งานที่เกี่ยวข้องกับ Object Storage / Bucket (7 วัน / ถาวร)
              ทางทีมขอให้ตรวจสอบรายละเอียดเพิ่มเติมได้ที่ knowledge/file-storage.yaml (fs-suspension-7-days) ครับ
              อ้างอิงข้อกำหนดและเงื่อนไขการให้บริการ: https://openlandscape.cloud/policy/term_and_condition
              ขอบคุณครับ
            refs:
              - title: "ข้อตกลงและเงื่อนไขการให้บริการ"
                url: "https://openlandscape.cloud/policy/term_and_condition"
