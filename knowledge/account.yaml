            answer: |
              เรียน ผู้ใช้บริการ
              ระดับสมาชิกอาจมีการปรับเพิ่ม-ลดตามเงื่อนไขยอดสะสมในแต่ละช่วงเวลา
              ผู้ใช้บริการสามารถตรวจสอบรายละเอียดเงื่อนไขได้ตามลิงก์แนบครับ:
              https://blog.openlandscape.cloud/ols-privilege
              ขอบคุณครับ
            refs:
              - title: "สิทธิประโยชน์ระบบสมาชิก"
                url: "https://blog.openlandscape.cloud/ols-privilege"
